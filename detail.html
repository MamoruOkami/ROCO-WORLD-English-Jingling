<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>宠物详情</title>
  <link rel="stylesheet" href="style.css">

  <!-- 👇 核心：favicon 代码，直接复制 -->
  <link rel="icon" href="public/leo_favicon.png" type="image/png">
  <link rel="shortcut icon" href="public/leo_favicon.png" type="image/png">

</head>
<body>

<script src="load-pets.js"></script>

<div class="page-container">
  <button class="back-btn" onclick="history.back()">← 返回图鉴</button>
  <div id="detailArea" class="detail-card"></div>
</div>

<script>
const petList = [...petList1, ...petList2, ...petList3, ...petList4, ...petList5, ...petList6, ...petList7, ...petList8, ...petList9, ...petList10,
  ...petList11, ...petList12, ...petList13, ...petList14, ...petList15, ...petList16, ...petList17, ...petList18, ...petList19, ...petList20
];
const params = new URLSearchParams(location.search);
const id = parseInt(params.get("id"));
const pet = petList.find(p => p.id === id);

if (pet) {
  const elems = Array.isArray(pet.element) ? pet.element : [pet.element];
  const bg = elems.length === 1 
    ? elementColors[elems[0]] 
    : `linear-gradient(135deg, ${elementColors[elems[0]]}, ${elementColors[elems[1]]})`;

  document.getElementById("detailArea").innerHTML = `
    <div class="pet-layout">
      <div class="left-section">
        <div class="avatar-box" style="background:${bg}">
          <img class="avatar" src="public/images/${pet.id}.png" alt="${pet.name}">
        </div>
        <div class="name-row">
          <h2 class="pet-name">${pet.name}</h2>
            ${elems.map(e => `
            <span class="element" style="background:#1a1a1d; border:2px solid ${elementColors[e]}; color:#e0e0e0; display:inline-flex; align-items:center; gap:4px;">
              <img src="public/icons/${e}.png" class="element-icon">
              ${e}
            </span>
            `).join('')}
        </div>

        <h3>特性</h3>
        <div class="trait-box" style="display:flex; align-items:center; gap:12px;">
          <img src="public/traits/${pet.trait?.name || 'default'}.png" class="trait-icon" alt="特性图标">
          <div class="trait-text">
            <div class="trait-name">${pet.trait?.name || '无特性'}</div>
            <div class="trait-desc">${pet.trait?.desc || ''}</div>
          </div>
        </div>
      </div>

      <div class="right-section">
        <h3>种族值</h3>
        <div class= "stats-grid">
          
          <div class="stat-radar-3d">
            <!-- 六边形网格 -->
            <div class="radar-grid">
            </div>

            <!-- 数值区域 -->
            <div class="radar-area" style="
              --hp: ${pet.hp /3}%;
              --atk: ${pet.atk /3}%;
              --mat: ${pet.mat /3}%;
              --def: ${pet.def /3}%;
              --mdf: ${pet.mdf /3}%;
              --spd: ${pet.spd /3}%;
            ">
            </div>

            <!-- 六个角的标签 -->
            <div class="radar-label label-hp">血量</div>
            <div class="radar-label label-atk">攻击</div>
            <div class="radar-label label-mat">魔攻</div>
            <div class="radar-label label-def">防御</div>
            <div class="radar-label label-mdf">魔抗</div>
            <div class="radar-label label-spd">速度</div>
          </div>

          <!-- 下方统一数值条 -->
          <div class="stat-numbers-bar">
            <span>血量 ${pet.hp}</span>
            <span>攻击 ${pet.atk}</span>
            <span>魔攻 ${pet.mat}</span>
            <span>防御 ${pet.def}</span>
            <span>魔抗 ${pet.mdf}</span>
            <span>速度 ${pet.spd}</span>
          </div>
        </div>
      </div>

    </div> <!-- 👈 这个闭合标签必须在技能区域的前面！ -->

    <!-- 👇 技能区域放在这里，才会在下半界面！ -->
    <div class="middle-section">
      <h3>技能</h3>
      <div class="skills-grid">
          ${(pet.skills || []).map(s => `
            <div class="skill-item" style="display:flex; align-items:center; gap:10px;">
              <img src="public/skills/${s.element}/${s.name}.png" class="skill-icon">
              <div class="skill-info">
                <div class="skill-name">${s.name}</div>
                ${s.desc ? `<div style="font-size:13px;color:#ccc;margin-top:4px;">${s.desc}</div>` : ''}
                <div class="skill-desc" style="display:flex; gap:12px; margin-top:4px;">
                  <span>属性：${s.element || '-'}</span>
                  <span>威力：${s.power || '0'}</span>
                  <span>类型：${s.type || '-'}</span>
                  <span>能量消耗：${s.cost || '0'} </span>
                </div>                
              </div>
            </div>
          `).join('')}
      </div>
    </div>
  `;
} else {
  document.getElementById("detailArea").innerHTML = "<h2>宠物不存在</h2>";
}
</script>

</html>
